services:
  api:
    build: .
    container_name: pitchboost-api-gateway
    ports: ["8000:8000"]
    env_file: [.env]
    volumes:
      - ./app:/app/app:ro
      - ./.env:/app/.env:ro

  bot:
    image: python:3.11-slim
    working_dir: /bot
    command: bash -lc "pip install aiogram==3.13.1 httpx==0.27.0 && python run.py"
    env_file: [.env]
    environment:
      API_BASE_URL: "http://api:8000"
    volumes:
      - ./bot:/bot
    depends_on:
      - api
